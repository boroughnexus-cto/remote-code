<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwarmOps Voice</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 24px 16px;
  }
  h1 { font-size: 1.25rem; font-weight: 700; color: #38bdf8; letter-spacing: 0.04em; margin-bottom: 4px; }
  .subtitle { font-size: 0.75rem; color: #64748b; margin-bottom: 20px; }
  .card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 16px;
    padding: 20px;
    width: 100%;
    max-width: 440px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  label { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 4px; }
  select, .mode-bar { width: 100%; }
  select {
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 8px;
    color: #e2e8f0;
    padding: 8px 10px;
    font-size: 0.875rem;
    appearance: none;
  }
  .mode-bar {
    display: flex;
    border: 1px solid #334155;
    border-radius: 8px;
    overflow: hidden;
  }
  .mode-btn {
    flex: 1;
    padding: 7px 0;
    font-size: 0.75rem;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    background: transparent;
    color: #64748b;
  }
  .mode-btn.active-assistant { background: #0ea5e9; color: #fff; }
  .mode-btn.active-relay     { background: #1e40af; color: #fff; }
  .mode-btn:not(.active-assistant):not(.active-relay):hover { background: #1e293b; color: #e2e8f0; }
  .mode-hint { font-size: 0.7rem; color: #64748b; min-height: 1em; }

  /* History */
  .history {
    background: #0f172a;
    border: 1px solid #1e293b;
    border-radius: 10px;
    padding: 12px;
    height: 220px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .history:empty::before { content: 'Hold the mic button to speak.'; color: #475569; font-size: 0.8rem; display: block; padding: 8px 0; }
  .bubble {
    max-width: 88%;
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 0.85rem;
    line-height: 1.4;
    word-break: break-word;
  }
  .bubble.user     { align-self: flex-end; background: #0ea5e9; color: #fff; border-bottom-right-radius: 3px; }
  .bubble.assistant{ align-self: flex-start; background: #1e293b; border: 1px solid #334155; color: #e2e8f0; border-bottom-left-radius: 3px; }

  /* Mic button */
  .controls { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .status-line { font-size: 0.75rem; color: #38bdf8; min-height: 1.1em; font-weight: 500; }
  .status-line.err { color: #f87171; }
  .mic-wrap { position: relative; }
  .mic-btn {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    background: #0ea5e9;
    color: #fff;
    box-shadow: 0 4px 20px rgba(14,165,233,0.4);
    font-size: 28px;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  .mic-btn:active, .mic-btn.recording { background: #ef4444; box-shadow: 0 4px 20px rgba(239,68,68,0.5); transform: scale(1.06); }
  .mic-btn.relay { background: #1e40af; box-shadow: 0 4px 20px rgba(30,64,175,0.4); }
  .mic-btn.relay:active, .mic-btn.relay.recording { background: #ef4444; }
  .mic-btn.busy { background: #475569; cursor: not-allowed; box-shadow: none; }
  .ping {
    position: absolute; inset: -6px;
    border-radius: 50%;
    background: rgba(239,68,68,0.25);
    animation: ping 1s ease-out infinite;
    pointer-events: none;
  }
  @keyframes ping { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
  .hint { font-size: 0.65rem; color: #475569; }

  .clear-btn {
    background: none; border: 1px solid #334155; border-radius: 6px;
    color: #64748b; padding: 4px 12px; font-size: 0.7rem; cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .clear-btn:hover { border-color: #f87171; color: #f87171; }
</style>
</head>
<body>
<h1>🎙 SwarmOps Voice</h1>
<p class="subtitle">Voice control for your AI agent fleet</p>

<div class="card">
  <!-- Session -->
  <div>
    <label for="sess">Session</label>
    <select id="sess"><option value="">— loading sessions —</option></select>
  </div>

  <!-- Mode -->
  <div>
    <label>Mode</label>
    <div class="mode-bar">
      <button class="mode-btn active-assistant" data-mode="assistant" onclick="setMode('assistant')">Assistant</button>
      <button class="mode-btn" data-mode="relay" onclick="setMode('relay')">Relay to Orchestrator</button>
    </div>
    <p class="mode-hint" id="modeHint">Ask about session status, agents, tasks, or give instructions.</p>
  </div>

  <!-- History -->
  <div class="history" id="history"></div>

  <!-- Controls -->
  <div class="controls">
    <div class="status-line" id="status"></div>
    <div class="mic-wrap">
      <div class="ping" id="ping" style="display:none"></div>
      <button class="mic-btn" id="mic" title="Hold to talk">🎙</button>
    </div>
    <p class="hint" id="micHint">Hold to record · Release to send</p>
    <button class="clear-btn" onclick="clearHistory()">Clear</button>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let mode = 'assistant';
let history = [];
let recorder = null;
let chunks = [];
let audioCtx = null;
let busy = false;
let activeSources = [];
let ttsAbort = null;

// ── Init ───────────────────────────────────────────────────────────────────
async function init() {
  try {
    const resp = await fetch('/api/swarm/sessions');
    if (!resp.ok) throw new Error();
    const sessions = await resp.json();
    const sel = document.getElementById('sess');
    sel.innerHTML = sessions.length
      ? sessions.map(s => `<option value="${esc(s.id)}">${esc(s.name)}</option>`).join('')
      : '<option value="">No sessions</option>';
  } catch { /* server may not be ready yet */ }
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.className = 'mode-btn' + (b.dataset.mode === m ? ` active-${m}` : '');
  });
  document.getElementById('modeHint').textContent = m === 'relay'
    ? "Your voice goes directly into the orchestrator's Claude Code session."
    : "Ask about session status, agents, tasks, or give instructions.";
  const mic = document.getElementById('mic');
  mic.className = 'mic-btn' + (m === 'relay' ? ' relay' : '');
}

// ── Mic hold-to-talk ────────────────────────────────────────────────────────
function setupMic() {
  const btn = document.getElementById('mic');

  const startRec = async (e) => {
    e.preventDefault();
    if (busy) return;
    stopTTS();
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      chunks = [];
      recorder = new MediaRecorder(stream);
      recorder.ondataavailable = ev => { if (ev.data.size) chunks.push(ev.data); };
      recorder.onstop = () => { stream.getTracks().forEach(t => t.stop()); runPipeline(); };
      recorder.start();
      btn.classList.add('recording');
      document.getElementById('ping').style.display = '';
      setStatus('Recording…');
    } catch (err) {
      setStatus('Mic access denied', true);
    }
  };

  const stopRec = (e) => {
    e.preventDefault();
    if (recorder && recorder.state === 'recording') {
      recorder.stop();
      recorder = null;
      btn.classList.remove('recording');
      document.getElementById('ping').style.display = 'none';
    }
  };

  // Mouse
  btn.addEventListener('mousedown', startRec);
  btn.addEventListener('mouseup', stopRec);
  btn.addEventListener('mouseleave', stopRec);
  // Touch
  btn.addEventListener('touchstart', startRec, { passive: false });
  btn.addEventListener('touchend', stopRec, { passive: false });
}

// ── Pipeline: audio → STT → LLM/inject → TTS ───────────────────────────────
async function runPipeline() {
  if (busy) return;
  busy = true;
  setBusy(true);

  const sessionId = document.getElementById('sess').value;
  const blob = new Blob(chunks, { type: 'audio/webm' });
  chunks = [];

  // 1. STT
  setStatus('Transcribing…');
  let userText = '';
  try {
    const form = new FormData();
    form.append('file', blob, 'recording.webm');
    const resp = await fetch('/api/swarm/transcribe', { method: 'POST', body: form });
    if (!resp.ok) throw new Error((await resp.json().catch(()=>({}))).error || resp.statusText);
    userText = ((await resp.json()).text || '').trim();
  } catch (err) {
    setStatus(err.message || 'Transcription failed', true);
    done(); return;
  }

  if (!userText) { setStatus(''); done(); return; }
  addBubble('user', userText);

  // 2. LLM or inject
  setStatus('Thinking…');
  let assistantText = '';

  if (mode === 'relay' && sessionId) {
    try {
      const resp = await fetch('/api/swarm/voice/inject', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: userText, session_id: sessionId })
      });
      if (!resp.ok) throw new Error((await resp.json().catch(()=>({}))).error || resp.statusText);
      const data = await resp.json();
      assistantText = `Message sent to ${data.agent_name || 'orchestrator'}.`;
    } catch (err) {
      setStatus(err.message || 'Inject failed', true);
      done(); return;
    }
  } else {
    try {
      const resp = await fetch('/api/swarm/voice/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: userText,
          session_id: sessionId,
          history: history.filter(t => t.role === 'user').map(t => ({ role: t.role, content: t.text }))
        })
      });
      if (!resp.ok) throw new Error((await resp.json().catch(()=>({}))).error || resp.statusText);
      assistantText = ((await resp.json()).text || '').trim();
    } catch (err) {
      setStatus(err.message || 'Assistant error', true);
      done(); return;
    }
  }

  if (!assistantText) { done(); return; }
  addBubble('assistant', assistantText);

  // 3. Streaming PCM TTS
  setStatus('Speaking…');
  try { await streamTTS(assistantText); } catch (err) {
    if (err.name !== 'AbortError') setStatus('TTS failed — text shown above', true);
  }
  done();
}

function done() {
  busy = false;
  setBusy(false);
  setStatus('');
}

// ── Streaming PCM TTS ────────────────────────────────────────────────────────
function ensureAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
  return audioCtx;
}

function stopTTS() {
  activeSources.forEach(s => { try { s.stop(0); } catch(_){} });
  activeSources = [];
  if (ttsAbort) { ttsAbort.abort(); ttsAbort = null; }
}

async function streamTTS(text) {
  ttsAbort = new AbortController();
  const signal = ttsAbort.signal;
  const ctx = ensureAudioCtx();
  if (ctx.state === 'suspended') await ctx.resume();

  const resp = await fetch('/api/swarm/tts', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text, format: 'pcm' }),
    signal
  });
  if (!resp.ok || !resp.body) throw new Error('TTS error ' + resp.status);

  const reader = resp.body.getReader();
  signal.addEventListener('abort', () => reader.cancel(), { once: true });

  let nextStart = ctx.currentTime + 0.05;
  let leftover = new Uint8Array(0);

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    const combined = new Uint8Array(leftover.length + value.length);
    combined.set(leftover); combined.set(value, leftover.length);
    const usable = combined.length - (combined.length % 2);
    leftover = combined.slice(usable);
    if (usable === 0) continue;

    const view = new DataView(combined.buffer, 0, usable);
    const n = usable / 2;
    const f32 = new Float32Array(n);
    for (let i = 0; i < n; i++) f32[i] = view.getInt16(i*2, true) / 32768;

    const buf = ctx.createBuffer(1, n, 24000);
    buf.getChannelData(0).set(f32);
    const src = ctx.createBufferSource();
    src.buffer = buf; src.connect(ctx.destination);
    src.onended = () => { activeSources = activeSources.filter(s => s !== src); };
    activeSources.push(src);
    nextStart = Math.max(nextStart, ctx.currentTime + 0.01);
    src.start(nextStart);
    nextStart += buf.duration;
  }

  const remaining = nextStart - ctx.currentTime;
  if (remaining > 0.05) await new Promise(r => setTimeout(r, remaining * 1000));
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function addBubble(role, text) {
  history.push({ role, text });
  const el = document.getElementById('history');
  const div = document.createElement('div');
  div.className = 'bubble ' + role;
  div.textContent = text;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function clearHistory() {
  history = [];
  document.getElementById('history').innerHTML = '';
}

function setStatus(msg, isErr = false) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status-line' + (isErr ? ' err' : '');
}

function setBusy(b) {
  const mic = document.getElementById('mic');
  if (b) mic.classList.add('busy'); else mic.classList.remove('busy');
  document.getElementById('micHint').textContent = b ? '' : 'Hold to record · Release to send';
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Boot ──────────────────────────────────────────────────────────────────────
init();
setupMic();
</script>
</body>
</html>
