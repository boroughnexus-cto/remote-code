name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: v1.64.8
        # continue-on-error: pre-existing errcheck debt across api.go/swarm.go;
        # remove once the codebase is lint-clean.
        continue-on-error: true
      - run: make ci
