name: CI
on:
  push:
    branches: [main, rework/**]
  pull_request:
    branches: [main]
jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      NO_COLOR: "1"
      TERM: dumb
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: v1.64.8
        # continue-on-error: pre-existing errcheck debt across api.go/swarm.go;
        # remove once the codebase is lint-clean.
        continue-on-error: true
      - run: make ci
      - name: Verify golden files are up to date
        env:
          UPDATE_GOLDEN: ""
        run: |
          go test -run "TestView_Empty|TestView_Sessions|TestView_PoolSlots" -count=1 ./...
          git diff --exit-code testdata/

  deploy:
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: [self-hosted, nuc-ubuntu-dev]
    steps:
      - uses: actions/checkout@v4
      - name: Build and restart swarmops
        run: make restart
